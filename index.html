<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // Smooth scroll navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const menu = document.getElementById('mobileMenu');
        menuToggle.addEventListener('click', () => {
            menu.classList.toggle('open');
        });

        // Form validation
        document.getElementById('myForm').onsubmit = function() {
            var name = document.getElementById('name').value;
            if(name === '') {
                alert('Name is required');
                return false;
            }
            return true;
        };

        // Scroll animations
        const scrollElements = document.querySelectorAll('.scroll-animation');
        const elementInView = (el, className) => {
            const elementTop = el.getBoundingClientRect().top;
            const elementBottom = el.getBoundingClientRect().bottom;
            const viewportTop = 0;
            const viewportBottom = window.innerHeight;
            return elementBottom > viewportTop && elementTop < viewportBottom;
        };

        const displayScrollElement = (element) => {
            element.classList.add('active');
        };

        const handleScrollAnimation = () => {
            scrollElements.forEach((el) => {
                if (elementInView(el, 'active')) {
                    displayScrollElement(el);
                }
            });
        };

        window.addEventListener('scroll', () => {
            handleScrollAnimation();
        });

        // Theme switcher
        const themeSwitcher = document.getElementById('themeSwitcher');
        themeSwitcher.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
        });

        // Back-to-top button
        const backToTopBtn = document.getElementById('backToTop');
        window.onscroll = function() {
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                backToTopBtn.style.display = "block";
            } else {
                backToTopBtn.style.display = "none";
            }
        };

        backToTopBtn.onclick = function() {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        };
    </script>
</head>
<body>
    <nav>
        <button id="menuToggle">Toggle Menu</button>
        <div id="mobileMenu" class="menu">
            <!-- Menu items -->
        </div>
    </nav>

    <form id="myForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="submit" value="Submit">
    </form>

    <button id="themeSwitcher">Switch Theme</button>
    <button id="backToTop" style="display:none;">Back to Top</button>

    <div class="scroll-animation">
        <!-- Content to animate on scroll -->
    </div>
</body>
</html>
